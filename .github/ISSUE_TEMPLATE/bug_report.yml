name: Bug report
description: Report a reproducible bug
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out all sections to help us reproduce and fix the issue.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the bug
      placeholder: Profile fails to load on PowerShell 7.5
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps
      placeholder: |
        1. Open PowerShell
        2. Run ...
        3. Observe error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Windows 11 24H2
  - type: input
    id: psver
    attributes:
      label: PowerShell version
      placeholder: 7.5.1
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant errors or add screenshots
